<div id="welcome-screen" class="welcome-container">
    <div class="welcome-bg-glow glow-1"></div>
    <div class="welcome-bg-glow glow-2"></div>

    <div class="welcome-card">
        
        <div class="welcome-card-content">
            <span class="welcome-greeting anim-blur-reveal">Initiating Creative Engine...</span>
            
            <h1 class="welcome-heading">
                <div class="anim-blur-reveal delay-1">Welcome to My</div>
                <div class="anim-blur-reveal delay-2 text-gradient-neon neon-pulse">Portfolio Website</div>
            </h1>
            
            <p class="welcome-subtext anim-blur-reveal delay-3 font-tech">
                "Architecting the Future.<br>
                <span class="highlight-neon">Crafting Seamless Realities.</span>"
            </p>
            
            <div class="welcome-loading-area anim-blur-reveal delay-4">
                <div class="loading-bar-container">
                    <div class="loading-bar-progress" id="welcome-progress"></div>
                </div>
                <div class="loading-text font-code">
                    <span id="welcome-status">Calibrating core systems...</span>
                    <span id="welcome-percent">0%</span>
                </div>
            </div>
        </div>

        <div class="welcome-3d-wrapper">
            <div class="css-abstract-container">
                <svg class="abstract-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#bc13fe" stop-opacity="0.95"/>
                            <stop offset="100%" stop-color="#00ffa3" stop-opacity="0.95"/>
                        </linearGradient>
                        <filter id="glowBlur">
                            <feGaussianBlur stdDeviation="12" result="blur"/>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                        </filter>
                    </defs>
                    
                    <circle cx="200" cy="200" r="140" fill="none" stroke="#bc13fe" stroke-width="2" stroke-dasharray="8 15" opacity="0.8" class="ring-1"/>
                    <circle cx="200" cy="200" r="110" fill="none" stroke="#00ffa3" stroke-width="3" stroke-dasharray="25 20" opacity="0.9" class="ring-2"/>
                    <circle cx="200" cy="200" r="160" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" class="ring-3"/>
                    
                    <g class="crystal">
                        <polygon points="200,60 280,200 200,340 120,200" fill="url(#crystalGrad)" filter="url(#glowBlur)"/>
                        <polygon points="200,60 280,200 200,200" fill="rgba(255,255,255,0.4)"/>
                        <polygon points="200,340 280,200 200,200" fill="rgba(0,0,0,0.3)"/>
                        <polygon points="200,60 120,200 200,200" fill="rgba(255,255,255,0.15)"/>
                    </g>
                </svg>
            </div>
        </div>

    </div>
</div>
