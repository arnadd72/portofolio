<!-- includes/sections/contact.html -->
<section id="contact" class="section contact-section">
    <div class="container reveal-scale">
        <div class="contact-grid">
            
            <!-- Area Info Kontak Kiri -->
            <div class="contact-info-col" data-aos="fade-right">
                <h2 class="section-title" style="text-align: left;">Mari <span>Berdiskusi</span></h2>
                <p class="text-muted mt-1 mb-4" style="font-size: 1.05rem;">
                    Punya proyek menarik, pertanyaan teknis, atau sekadar ingin menyapa? Saya selalu terbuka untuk kolaborasi dan peluang baru.
                </p>

                <!-- Kartu Info Kontak -->
                <div class="contact-cards-wrapper">
                    <a href="mailto:nosaclp4@gmail.com" class="contact-info-card glass glow-card magnetic-el">
                        <div class="glow"></div>
                        <div class="icon-circle">
                            <i data-lucide="mail"></i>
                        </div>
                        <div class="info-content">
                            <h4>Email</h3>
                            <p>nosaclp4@gmail.com</p>
                        </div>
                    </a>

                    <div class="contact-info-card glass glow-card magnetic-el">
                        <div class="glow"></div>
                        <div class="icon-circle">
                            <i data-lucide="map-pin"></i>
                        </div>
                        <div class="info-content">
                            <h4>Lokasi</h3>
                            <p>Indonesia (Remote / On-site)</p>
                        </div>
                    </div>
                </div>

                <!-- Kartu Sosmed Kecil -->
                <div class="social-mini-grid mt-3">
                    <a href="https://github.com/arnadd72" target="_blank" class="social-mini-card glass glow-card tilt-glass">
                        <div class="glow"></div>
                        <i data-lucide="github"></i>
                    </a>
                    <a href="#" target="_blank" class="social-mini-card glass glow-card tilt-glass">
                        <div class="glow"></div>
                        <i data-lucide="linkedin"></i>
                    </a>
                    <a href="https://instagram.com/n.sa2_7" target="_blank" class="social-mini-card glass glow-card tilt-glass">
                        <div class="glow"></div>
                        <i data-lucide="instagram"></i>
                    </a>
                </div>
            </div>

            <!-- Area Form Kanan -->
            <div class="contact-form-col glass p-4" data-aos="fade-left" data-aos-delay="200">
                <form id="contactForm" class="intensive-form">
                    <input type="text" name="honeypot" style="display:none" autocomplete="off">

                    <div class="form-row">
                        <div class="form-group floating-group">
                            <input type="text" id="name" name="name" required class="form-control floating-input" placeholder=" ">
                            <label for="name" class="floating-label">Nama Anda</label>
                            <div class="input-glow-line"></div>
                        </div>

                        <div class="form-group floating-group">
                            <input type="email" id="email" name="email" required class="form-control floating-input" placeholder=" ">
                            <label for="email" class="floating-label">Alamat Email</label>
                            <div class="input-glow-line"></div>
                        </div>
                    </div>

                    <div class="form-group floating-group mt-3">
                        <input type="text" id="subject" name="subject" required class="form-control floating-input" placeholder=" ">
                        <label for="subject" class="floating-label">Subjek Pembicaraan</label>
                        <div class="input-glow-line"></div>
                    </div>

                    <div class="form-group floating-group mt-3">
                        <textarea id="message" name="message" rows="4" required class="form-control floating-input" placeholder=" "></textarea>
                        <label for="message" class="floating-label">Detail Pesan...</label>
                        <div class="input-glow-line"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-intensive magnetic-el mt-4" id="submitBtn">
                        <span class="btn-text">Kirim Pesan Sekarang</span>
                        <i data-lucide="send" class="icon-sm"></i>
                        <div class="btn-glow-aura"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
